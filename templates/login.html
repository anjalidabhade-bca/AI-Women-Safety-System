<!DOCTYPE html>
<html>
<head>

<title>Women Safety Login</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>

.container{
width:350px;
margin:auto;
margin-top:100px;
text-align:center;
padding:30px;
border-radius:10px;
background:#f5f5f5;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:red;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:darkred;
}

a{
text-decoration:none;
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Women Safety Login</h2>

{% with messages = get_flashed_messages() %}
{% if messages %}
<script>alert("{{ messages[0] }}")</script>
{% endif %}
{% endwith %}

<form action="/login" method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<br>

<p>Don't have an account?</p>

<a href="/register_page">Create Account</a>

</div>

</body>
</html>
