<!DOCTYPE html>
<html>
<head>

<title>Create Account</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>

.container{
width:400px;
margin:auto;
margin-top:70px;
text-align:center;
padding:30px;
border-radius:10px;
background:#f5f5f5;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:8px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:red;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:darkred;
}

a{
text-decoration:none;
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Create Account</h2>

<form action="/register" method="POST">

<input name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<input name="emergency_contact1" placeholder="Emergency Contact 1" required>

<input name="emergency_contact2" placeholder="Emergency Contact 2" required>

<button type="submit">Register</button>

</form>

<br>

<p>Already have an account?</p>

<a href="/">Login</a>

</div>

</body>
</html>
