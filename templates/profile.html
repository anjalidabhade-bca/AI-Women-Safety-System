<!DOCTYPE html>
<html>
<head>

<title>User Profile</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
margin:0;
padding:0;
}

.container{
width:400px;
margin:80px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
text-align:center;
}

.profile-pic{
width:120px;
height:120px;
border-radius:50%;
margin-bottom:15px;
border:4px solid #ff4b5c;
}

h2{
margin:10px 0;
color:#333;
}

.info{
margin-top:20px;
text-align:left;
}

.info p{
background:#f5f5f5;
padding:10px;
border-radius:8px;
margin:10px 0;
}

label{
font-weight:bold;
color:#444;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#ff4b5c;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#e63946;
}

</style>

</head>

<body>

<div class="container">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="profile-pic">

<h2>{{ name }}</h2>

<div class="info">

<p><label>Email:</label> {{ email }}</p>

<p><label>Emergency Contact 1:</label> {{ contact1 }}</p>

<p><label>Emergency Contact 2:</label> {{ contact2 }}</p>

</div>

<button onclick="window.location.href='/dashboard'">Back to Dashboard</button>

</div>

</body>
</html>
